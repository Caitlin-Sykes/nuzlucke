[api]
# This is the page that will be scraped
# You can either point it at a specific page (like part 1 of a walk through)
# or at a group of pages, ie, contains links to all parts of a walkthrough
page_to_scrape = "https://bulbapedia.bulbagarden.net/wiki/Category:Red_and_Blue_walkthrough"
#page_to_scrape = "https://bulbapedia.bulbagarden.net/wiki/Walkthrough:Pok%C3%A9mon_Omega_Ruby_and_Alpha_Sapphire/Part_1"

[logging]
logging_level = "DEBUG"
logging_file_name = "pokemon_data_extractor.log"

[debug]
#if this is set to true, it will do extra debugging steps, such as
# - store a local cache of the file it has fetched
debug = true
# Below is used if debug is set to TRUE,
# next time it is ran, it will store a copy of whatever it fetched, for testing purposes
file_to_store_local_copy="page_cache.html"